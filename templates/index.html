<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirxes Clinical Risk Dashboard</title>
        <link href="https://stackpath.bootstrapcdn.com/bootswatch/4.5.2/flatly/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .high-risk { background-color: #d9534f; color: white; }
        .medium-risk { background-color: #f0ad4e; color: white; }
        .low-risk { background-color: #5cb85c; color: white; }
        #patient-table tbody tr:hover {
            background-color: rgba(0,0,0,0.1);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a class="navbar-brand" href="#">Mirxes Clinical Risk Dashboard</a>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card mb-4">
                    <div class="card-body">
                        <h4 class="card-title">Filter & Search</h4>
                        <input type="text" id="search-input" class="form-control mb-3" placeholder="Search by Patient ID...">
                        <select id="risk-category-filter" class="form-control">
                            <option value="">All Categories</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <button id="run-script-btn" class="btn btn-primary mt-3">Update & Run Script</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Risk Distribution</h4>
                        <canvas id="risk-chart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-9">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Patient Details</h4>
                        <table class="table" id="patient-table">
                            <thead>
                                <tr>
                                    <th data-column="Patient ID" style="cursor: pointer;">Patient ID</th>
                                    <th data-column="Risk Score" style="cursor: pointer;">Risk Score</th>
                                    <th data-column="Risk Category" style="cursor: pointer;">Risk Category</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Data will be inserted here by JavaScript -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('search-input');
            const riskCategoryFilter = document.getElementById('risk-category-filter');
            const patientTableBody = document.querySelector('#patient-table tbody');
            const tableHeaders = document.querySelectorAll('#patient-table th');
            let chart;

            let allPatients = [];
            let filteredPatients = [];
            let sortColumn = null;
            let sortDirection = 'asc';

            function updateSortIcons() {
                tableHeaders.forEach(header => {
                    const column = header.getAttribute('data-column');
                    if (column) {
                        let icon = ' <i class="fas fa-sort"></i>';
                        if (column === sortColumn) {
                            icon = sortDirection === 'asc' ? ' <i class="fas fa-sort-up"></i>' : ' <i class="fas fa-sort-down"></i>';
                        }
                        header.innerHTML = `${column}${icon}`;
                    }
                });
            }

            function renderTable(patients) {
                patientTableBody.innerHTML = '';
                patients.forEach(patient => {
                    const row = document.createElement('tr');
                    
                    let categoryClass = '';
                    if (patient['Risk Category'] === 'High') {
                        categoryClass = 'high-risk';
                    } else if (patient['Risk Category'] === 'Medium') {
                        categoryClass = 'medium-risk';
                    } else if (patient['Risk Category'] === 'Low') {
                        categoryClass = 'low-risk';
                    }
                    row.classList.add(categoryClass);

                    row.innerHTML = `
                        <td>${patient['Patient ID']}</td>
                        <td>${patient['Risk Score']}</td>
                        <td>${patient['Risk Category']}</td>
                        <td>
                            <a href="/api/patients/${patient['Patient ID']}/report" class="btn btn-sm btn-info" target="_blank">Download Report</a>
                        </td>
                    `;
                    patientTableBody.appendChild(row);
                });
            }

            function updateChart(patients) {
                const categoryCounts = { High: 0, Medium: 0, Low: 0 };
                patients.forEach(patient => {
                    categoryCounts[patient['Risk Category']]++;
                });

                if (chart) {
                    chart.destroy();
                }
                const ctx = document.getElementById('risk-chart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['High', 'Medium', 'Low'],
                        datasets: [{
                            data: [categoryCounts.High, categoryCounts.Medium, categoryCounts.Low],
                            backgroundColor: ['#d9534f', '#f0ad4e', '#5cb85c']
                        }]
                    }
                });
            }

            function sortData(patients) {
                if (!sortColumn) {
                    return patients;
                }
                return patients.sort((a, b) => {
                    const valA = a[sortColumn];
                    const valB = b[sortColumn];

                    if (valA < valB) {
                        return sortDirection === 'asc' ? -1 : 1;
                    }
                    if (valA > valB) {
                        return sortDirection === 'asc' ? 1 : -1;
                    }
                    return 0;
                });
            }

            function filterAndSortData() {
                const searchValue = searchInput.value.toLowerCase();
                const riskCategory = riskCategoryFilter.value;

                filteredPatients = allPatients.filter(patient => {
                    const patientIdLower = patient['Patient ID'].toLowerCase();
                    const matchesSearch = patientIdLower.includes(searchValue);
                    const matchesCategory = riskCategory ? patient['Risk Category'] === riskCategory : true;
                    return matchesSearch && matchesCategory;
                });

                const sortedPatients = sortData([...filteredPatients]);
                renderTable(sortedPatients);
                updateChart(filteredPatients);
                updateSortIcons();
            }

            tableHeaders.forEach(header => {
                if (header.hasAttribute('data-column')) {
                    header.addEventListener('click', () => {
                        const column = header.getAttribute('data-column');
                        if (sortColumn === column) {
                            sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                        } else {
                            sortColumn = column;
                            sortDirection = 'asc';
                        }
                        filterAndSortData();
                    });
                }
            });

            searchInput.addEventListener('input', filterAndSortData);
            riskCategoryFilter.addEventListener('change', filterAndSortData);

            const runScriptBtn = document.getElementById('run-script-btn');
            runScriptBtn.addEventListener('click', function() {
                runScriptBtn.disabled = true;
                runScriptBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running...';

                fetch('/api/run-script', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            alert('Script executed successfully!');
                            // Re-fetch data
                            fetch('/api/patients')
                                .then(response => response.json())
                                .then(data => {
                                    allPatients = Object.entries(data).map(([id, values]) => ({
                                        'Patient ID': id,
                                        'Risk Score': values.risk_score,
                                        'Risk Category': values.risk_category
                                    }));
                                    filterAndSortData();
                                });
                        } else {
                            alert('Error executing script: ' + data.error);
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('An error occurred while running the script.');
                    })
                    .finally(() => {
                        runScriptBtn.disabled = false;
                        runScriptBtn.innerHTML = 'Update & Run Script';
                    });
            });

            fetch('/api/patients')
                .then(response => response.json())
                .then(data => {
                    allPatients = Object.entries(data).map(([id, values]) => ({
                        'Patient ID': id,
                        'Risk Score': values.risk_score,
                        'Risk Category': values.risk_category
                    }));
                    filterAndSortData();
                });
        });
    </script>
</body>
</html>
